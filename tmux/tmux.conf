# Shared tmux configuration for macOS, Ubuntu, and Omarchy.

##### Plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @catppuccin-flavour 'mocha'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_modules_right 'application session host date_time'
set -g @catppuccin_date_time_text '%Y-%m-%d %H:%M'

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3 nvim vim less man top htop btop "codex->zsh -ic cx" "~codex->zsh -ic cx"'

set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'

##### Core behavior

set-option -g destroy-unattached off
set-option -g exit-empty off
set-option -g prefix C-Space
unbind-key C-b
bind-key C-Space send-prefix

if-shell 'test -n "$SHELL" -a -x "$SHELL"' 'set-option -g default-shell "$SHELL"'
set-option -g default-command ''

if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
  'set-option -g default-terminal tmux-256color' \
  'set-option -g default-terminal screen-256color'
set-option -as terminal-features ',*:RGB'
set-option -s extended-keys on
set-option -sq extended-keys-format csi-u
set-option -as terminal-features ',xterm*:extkeys'
set-window-option -g xterm-keys on
set-option -g focus-events on
set-option -s escape-time 10

bind-key -n S-Enter send-keys -H 1b 5b 31 33 3b 32 75

set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-option -g history-limit 50000
set-option -g mouse on
set-option -g set-clipboard on
set-window-option -g mode-keys vi
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string '#S - #H'

set-option -g monitor-activity on
set-option -g visual-activity on
set-option -g activity-action other

##### Status

set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-left-length 80
set-option -g status-right-length 120
set-option -g status-left '#[bold] #S #[default]'
set-option -g status-right '#[default] #(hostname -s 2>/dev/null)  %Y-%m-%d %H:%M '

##### Panes and windows

unbind-key '"'
unbind-key %
bind-key '|' split-window -h -c '#{pane_current_path}'
bind-key '-' split-window -v -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux.conf reloaded'
bind-key s choose-tree -Zw

bind-key -n C-h if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(.*/)?(g?vim|nvim|view)(diff)?$"' 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(.*/)?(g?vim|nvim|view)(diff)?$"' 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(.*/)?(g?vim|nvim|view)(diff)?$"' 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(.*/)?(g?vim|nvim|view)(diff)?$"' 'send-keys C-l' 'select-pane -R'

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

##### Copy mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'sh -c "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi"'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'sh -c "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi"'

##### Plugin manager

if-shell 'test -x "$HOME/.config/tmux/plugins/tpm/tpm"' \
  'run-shell "$HOME/.config/tmux/plugins/tpm/tpm"' \
  'if-shell "test -x \"$HOME/.tmux/plugins/tpm/tpm\"" "run-shell \"$HOME/.tmux/plugins/tpm/tpm\""'
